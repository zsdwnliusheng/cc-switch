name: Build Windows ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - run: choco install llvm --yes
      - run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
      - run: pnpm install
      - run: pnpm tauri build --target aarch64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
      - uses: actions/upload-artifact@v4
        with:
          name: cc-switch-arm64
          path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/
