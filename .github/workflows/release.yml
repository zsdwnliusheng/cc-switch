name: Build Windows ARM64 (Full GUI + CLI)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust toolchain with ARM64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri App (Full Features + CLI included)
        run: |
          pnpm tauri build --target aarch64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-windows-arm64-full
          path: |
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/
            src-tauri/target/release/bundle/
          if-no-files-found: warn
